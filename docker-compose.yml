version: "3.8"

services:
  db:
    image: postgres:15
    container_name: ecommerce_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: ecommerce_api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    environment:
      PORT: 3000
    command: sh -c "sleep 8 && npx prisma generate && npx prisma migrate deploy && npm run dev"

volumes:
  postgres_data:
